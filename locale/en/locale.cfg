[mod-name]
lamented-circuit-additions=Lamented Circuit Additions

[mod-description]
lamented-circuit-additions=Adds new modes to the vanilla combinators: runtime-generated presets for the constant combinator, plus crafting-time lookup and a memory cell for the selector combinator.

[lca-gui]
mode=Mode:
mode-logistic-groups=Logistic Groups
mode-craftable-set=Craftable Set
machine=Machine:
machine-tooltip=Target Machine: the Craftable Set is computed from this machine's crafting categories
researched-only=Only researched recipes
no-fluid-inputs=Exclude recipes with fluid ingredients
recipe-count=__1__ recipes
section-active=Enable/disable this section
no-group=(no group)
no-group-assigned=[No group assigned]
rename-tooltip=Assign this section to a logistic group
group-select-tooltip=Assign this section to a logistic group. Grouped sections are shared across your force.
new-group-tooltip=Type a name and press Enter to create a new logistic group and assign this section to it.
multiplier-tooltip=Multiplier applied to all signals in this group
slot-tooltip=Left click to edit, right click to clear
any-quality=Any
mode-crafting-time=Crafting time
mode-crafting-time-description=Outputs each input recipe signal valued at its crafting time in ticks on the target machine. Input values are ignored; other signal types are dropped.
mode-memory-cell=Memory cell
mode-memory-cell-description=Continuously outputs the stored signals. Every tick the update condition holds against the combined input, the stored signals are replaced by the entire input; an empty input then clears the cell.
update-condition=Update condition
clear-stored=Clear stored signals
mode-recipe-products=Recipe products
mode-recipe-products-description=Outputs the products of each input recipe signal at their per-craft amounts. Input values are ignored; other signal types are dropped.
