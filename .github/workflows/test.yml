name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    name: busted (Lua 5.2)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Lua
        uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.2"
      - name: Set up LuaRocks
        uses: leafo/gh-actions-luarocks@v4
      - name: Install busted
        run: luarocks install busted
      - name: Run tests
        run: busted
